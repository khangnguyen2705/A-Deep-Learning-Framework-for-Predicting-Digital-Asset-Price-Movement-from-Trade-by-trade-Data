data:
  btc_usdt:
    train_path: "data/btc_usdt_train.parquet"
    test_path: "data/btc_usdt_test.parquet"
    # Paper-equivalent 11/3-month span on contemporary data. The original
    # paper used Mar 2019 – Nov 2019 train, Dec 2019 – Feb 2020 test; we
    # mirror that exactly on Mar 2025 – Jan 2026 train, Feb 2026 – Apr 2026
    # test (run on data fetched mid-May 2026).
    train_range: ["2025-03-01", "2026-01-31"]
    test_range:  ["2026-02-01", "2026-04-30"]
  other_pairs:
    path_template: "data/{symbol}_test.parquet"
    # EOSUSDT was permanently delisted from Binance spot in 2024 — the
    # data.binance.vision endpoint returns 404 for every month past mid-2024.
    # The paper transferred to ETH/BCH/LTC/EOS; we keep the first three.
    symbols: ["ETH", "BCH", "LTC"]
    range: ["2026-02-01", "2026-04-30"]

interval_lengths_ms:
  l_60000: 60000
  l_300000: 300000

setups:
  l_60000:
    l: 60000
    horizons:
      m_15:
        m: 15
        epsilon_train: 0.0
      m_30:
        m: 30
        epsilon_train: 0.0
    grid:
      T: [100, 300, 1000, 2000]
      N: [16, 32, 64, 128]
    best_params:
      m_15:
        T: 300
        N: 16
      m_30:
        T: 1000
        N: 32
  l_300000:
    l: 300000
    horizons:
      m_6:
        m: 6
        epsilon_train: 0.0
      m_24:
        m: 24
        epsilon_train: 0.0002
    grid:
      T: [60, 300, 500, 1000]
      N: [16, 32, 64, 128]
    best_params:
      m_6:
        T: 300
        N: 16
      m_24:
        T: 500
        N: 16

epsilon_test: 0.0

training:
  initial_lr: 0.001
  lr_decay: 0.0003
  lr_decay_epochs: 15
  min_lr: 0.0001
  batch_size_min: 32
  batch_size_max: 128
  early_stop_patience: 20
  early_stop_delta: 0.05
  max_epochs: 200
  loss: "categorical_crossentropy"
  optimizer: "adam"

splits:
  p: 10
  q_factor: 1.5
  seed: 42

windowing:
  offset_fraction_min: 0.10
  offset_fraction_max: 0.50

trading_sim:
  interval_ms: 300000
  T: 300
  m: 5
  fee: 0.000003
  hold_period_intervals: 5
